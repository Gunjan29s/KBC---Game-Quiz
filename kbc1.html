<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBC Game</title>
    <link rel="stylesheet" href="kbc1.css">
</head>
<body>
    <div class="main-logo">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/03/KAUN_BANEGA_CROREPATI_SEASON_11.jpg/250px-KAUN_BANEGA_CROREPATI_SEASON_11.jpg" alt="KBC Logo">
</div>

    <div id="loginScreen" class="login-screen" style="display: none;">
        <input type="text" id="username" placeholder="Enter Your Name">
        <button id="startBtn">START GAME</button>
    </div>


    <div id="gameScreen" class="main-wrapper" style="display:none;">

        <div class="top-bar">
            <div id="playerName"></div>
            <div id="price">₹0</div>
        </div>

        <div class="center-circle">
            <div class="timer-ring">
                <span id="result">30 s</span>
            </div>
        </div>

        <div class="question-section">
            <div id="questionBox" class="question-box">
                <span id="question">Question Here</span>
            </div>

            <div id="options" class="options-grid"></div>
        </div>

        <div class="lifeline-panel">
            <button id="fifty">50 : 50</button>
            <button id="friend">Call Friend</button>
           
        </div>

        <div class="money-ladder">
            <ul id="ladderList">
              <li>50,00,000</li>
              <li>25,00,000</li>
              <li>12,50,000</li>
              <li>6,40,000</li>
                <li>₹3,20,000</li>
                <li>₹1,60,000</li>
                <li>₹80,000</li>
                <li>₹40,000</li>
                <li>₹20,000</li>
                <li>₹10,000</li>
                <li>₹5,000</li>
                <li>₹3,000</li>
                <li>₹2,000</li>
                <li>₹1,000</li>
            </ul>
        </div>

    </div>
   <div id="introOnlyVideo">
    <iframe
        id="introFrame"
        src="https://www.youtube.com/embed/gf0VjCg2cn8?autoplay=1&mute=0&controls=0&rel=0&modestbranding=1"
        frameborder="0"
        allow="autoplay; encrypted-media"
        allowfullscreen>
    </iframe>
</div>
<div class="lock-area">
    <button id="lockBtn">🔒 LOCK ANSWER</button>
</div>

<audio id="timerAudio" src="tick.mp3" preload="auto"></audio>
<audio id="correctSound" src="correct.mp3" preload="auto"></audio>
<audio id="wrongSound" src="wrong.wav" preload="auto"></audio>
    <script src="kbc1.js"></script>
</body>
</html>
